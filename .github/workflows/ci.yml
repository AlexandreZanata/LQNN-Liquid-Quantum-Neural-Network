name: LQNN CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib tqdm fastapi uvicorn websockets pydantic Pillow
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install open_clip_torch transformers accelerate
          pip install chromadb pymongo aiohttp beautifulsoup4
          pip install pytest pytest-cov

      - name: Create required directories
        run: mkdir -p data/chroma data/state logs

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=lqnn --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check lqnn/ tests/ ui/ --select=E,F,W --ignore=E501,W291,W293
