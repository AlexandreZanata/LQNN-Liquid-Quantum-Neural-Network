<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LQNN v2 - Quantum Brain</title>
  <link rel="stylesheet" href="/static/terminal.css" />
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <h1>LQNN v2 - Quantum Associative Brain</h1>
      <nav>
        <a href="/chat" class="active">Chat</a>
        <a href="/training">Training</a>
      </nav>
      <span id="status-indicator" class="status offline">OFFLINE</span>
    </header>

    <main class="main-content">
      <section class="chat-panel">
        <div id="chat-output" class="chat-output"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Ask the brain something..." autocomplete="off" />
          <button id="btn-send">Send</button>
        </div>
      </section>

      <aside class="stats-panel">
        <div class="stat-card">
          <h3>Memory</h3>
          <div id="stat-concepts">Concepts: --</div>
          <div id="stat-associations">Associations: --</div>
          <div id="stat-learn-count">Learned: --</div>
          <div id="stat-query-count">Queries: --</div>
        </div>

        <div class="stat-card">
          <h3>Training</h3>
          <div id="stat-training-cycle">Cycle: --</div>
          <div id="stat-training-uptime">Uptime: --</div>
          <div id="stat-training-running">Status: --</div>
        </div>

        <div class="stat-card">
          <h3>Agents</h3>
          <div id="stat-agent-cycle">Cycle: --</div>
          <div id="stat-agent-online">Online: --</div>
          <div id="stat-agent-gaps">Gaps: --</div>
        </div>

        <div class="stat-card">
          <h3>Stable Concepts</h3>
          <ul id="concept-list"></ul>
        </div>

        <div class="stat-card actions">
          <h3>Actions</h3>
          <button id="btn-consolidate">Consolidate</button>
          <button id="btn-self-play">Self-Play</button>
          <button id="btn-learn">Learn Concept</button>
          <button id="btn-search">Web Search</button>
        </div>
      </aside>
    </main>
  </div>
  <script src="/static/terminal.js"></script>
</body>
</html>
