services:
  lqnn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lqnn-brain
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MONGO_URI=mongodb://mongo:27017/lqnn
      - MONGO_DB=lqnn
      - HF_HOME=/app/models/cache
      - TORCH_HOME=/app/models/cache
      - AUTO_TRAIN_ON_START=1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - model-cache:/app/models/cache
    depends_on:
      mongo:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  model-cache:
